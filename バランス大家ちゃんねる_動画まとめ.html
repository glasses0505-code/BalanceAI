const items = [
  {no:1,tags:["家賃改定", "交渉術", "管理会社"],title:`家賃値上げ交渉の実践テクニック｜拒否された時の2つの対策`,url:"https://www.youtube.com/watch?v=kFtP8RIf8Os",summary:`収益性（IRRなど）を高めるために不可欠な「家賃改定」の具体的な戦術が解説されています。
1. 家賃値上げ交渉で拒否された時の2つの対策
交渉を円滑に進め、納得してもらうための強力な根拠として以下の2つの指標を提示しています。これらを管理会社に共有し、入居者への説明資料に添付することが推奨されています。
消費者物価指数（CPI）の活用

物価が上昇している（インフレ）現状を客観的な数値で示します。

契約書に「経済情勢の変動により賃料を増減できる」旨の記載がある場合、これが直接的な根拠になります。
賃貸事例比較法の提示

近隣の類似物件の募集家賃と比較し、現在の家賃が相場より低いことを示します。

「周りはこれくらいで貸し出されている」という事実は、入居者への説得力を高めます。
2. 交渉のテクニックと注意点
絶妙な値上げ額の設定

3,000円程度の値上げは、入居者にとって「引っ越し費用を払うよりはマシ」と思える絶妙なラインであり、承諾されやすい傾向にあります。
落とし所を用意する

あえて3,000円で提案し、拒否された場合に「では2,000円で」と歩み寄ることで、交渉が成立するケースが多くあります。
告知のタイミング

更新の2ヶ月前程度に伝えるのが一般的です。早すぎると入居者に退去準備の期間を与えてしまうリスクがありますが、誠実な対応としては早めが望ましいという葛藤があります。
3. 大家としての判断基準
退去リスクの許容

大幅な値上げを要求して退去された場合、次の募集でより高い家賃を設定できれば、売却価格（出口戦略）に有利に働きます。

ただし、空室期間が長引くと損失が先行するため、エリアの需要を見極める必要があります。
適正な空室期間

空室がすぐに埋まるのは家賃が安すぎるサインかもしれません。3ヶ月以内で埋まる程度が適正価格であるという考え方が紹介されています。
4. 専門家（弁護士）の視点
賃料増額の調停や裁判は費用倒れになる可能性が高いため、通常の賃貸物件では避けるべきです。
基本的には管理会社を通じて、上記のような客観的データに基づいた話し合いで解決を目指すのが現実的です。
不動産投資における利回り向上や資産価値最大化のために、管理会社と連携してこれらのロジックを実践してみてはいかがでしょうか。`},
  {no:2,tags:["管理会社", "空室対策", "リスク管理"],title:`空室が埋まらない大家が見落とす「管理会社の危険サイン」とは？`,url:"https://www.youtube.com/watch?v=1KS_gmNfW6A",summary:`不動産投資家にとって「守りの要」である管理会社選び。特に空室対策や収益性に直結する重要なポイントが解説されています。
1. 「ダメな管理会社」を見分ける4つの危険サイン
管理会社が以下のような状態にある場合、投資のゲームオーバーを招くリスクがあります。
客付け能力・意欲の欠如

自社の仲介手数料（両手取り）にこだわり、他社への紹介を制限する（囲い込み）。

自社で決められないのに、他社へ営業をかけない。
家賃送金の遅延（最重要アラート）

1日でも送金が遅れたら「倒産・持ち逃げ」の兆候です。

経理の忙しさなどは理由にならず、2〜3回続くようなら即座に管理会社を変更すべきです。
リフォーム費用の不透明な上乗せ

退去時のリフォームで自社の利益をえぐいほど乗せているケース。

大家に相場より高い見積もりを出し、安く発注して差額を抜く構造に注意。
極端に狭い入居審査基準

トラブルを恐れるあまり、管理会社の都合で勝手に入居者を落としてしまう。

本来許容できるリスクまで排除し、空室期間を長引かせる。
2. 良い管理会社の選び方
中堅規模（2〜4店舗展開）が狙い目

大手すぎるとシステマチックで融通が利かず、小さすぎるとキャパ不足やアナログな弊害があるため。
他家さんからの口コミ・紹介

実際にそのエリアで投資している仲間からの評判が最も信頼できます。
3. 管理会社を味方につける「大家の振る舞い」
管理担当者も人間であり、感情で動く側面があるため、以下の工夫が有効です。
定期的なコンタクトと「思い出させる」工夫

「今日の反響はどう？」と頻繁に連絡をくれる大家の物件を、営業マンは優先的に決めようとします。
訪問のタイミングと気遣い

土日の昼時（営業マンがカップラーメンを食べる時間）などは避け、木曜日の夕方などを狙うのがベスト。

手土産（差し入れ）を持っていくなど、良好な関係を築くことで優先順位を上げてもらえます。
4. 契約上の注意点
「管理の縛り」に注意

契約書に「2年間は解約できない」などの期間縛りがある場合があり、管理が悪い場合にすぐ動けなくなるリスクがあります。
不動産投資は「入居さえ付ければ正義」です。現在の管理会社にこれらの兆候がないか、改めてチェックしてみてください。`},
  {no:3,tags:["融資・銀行", "投資戦略", "規模拡大"],title:`不動産投資の順番を間違えるな｜ワンルーム投資が融資停止につながるワケ`,url:"https://www.youtube.com/watch?v=5nKpndvPZFU",summary:`不動産投資で規模拡大（資産形成）を目指す際、最初にどの物件を買い、どの銀行を使うかという「順番」が成功の9割を決めると解説されています。
1. 規模拡大を阻む「よくある間違い」
高属性サラリーマンの「コツコツ投資」

年収が高い（例：2000万円）のに、現金で戸建てを買ってDIYをするような手法は、せっかくの「余心（融資枠）」を無駄にしています。

規模を追うなら、まずは銀行融資を最大限に活用して一棟物件を狙うべきです。
エリアの分散

地方の物件をバラバラに買うと、地元の信用金庫などの融資が受けられなくなります。

基本的には、自分の居住地や法人の所在地など、新金・地銀が融資可能なエリアに絞って実績を作ることが重要です。
最初に「節税目的の区分マンション」を買う

これが最大の失敗パターンです。節税のために赤字にすると銀行からの評価が下がり、次の大きな融資が受けられなくなります（融資ストップ）。

区分マンションの融資枠を使い切ってしまうと、一棟物件へ進めなくなるため、やるとしても最後で十分です。
2. 理想的な融資と購入の順番（年収700万円の例）
以下の順序で進めることで、効率的に融資枠を拡大し、賃貸売上を伸ばすことが可能です。
1棟目：オリックス銀行

法人を設立して購入。個人・法人の両方に対応しており、最初の一歩に適しています。
2棟目：auじぶん銀行

個人属性（年収の20倍程度）を活かして購入。
3棟目：滋賀銀行

同じく個人融資枠を活用。
4棟目：日本政策金融公庫（小規模物件）

抵当権を設定せずに借り、法人の実績作りに活用。
地元の信用金庫との関係構築

公庫で買った物件のリフォームローンなどから付き合いを始め、数千万円クラスのアパート融資へ繋げます。
ノンバンクの活用

AGビジネスサポートや三井住友トラスト・L&Fなどを使い、さらに数億円規模まで拡大します。
3. 大家としてのマインドセット
「節税」より「納税」

規模を拡大したいのであれば、しっかりと利益を出して納税し、会社を強く見せることが不可欠です。銀行は「納税している（＝儲かっている）会社」にさらにお金を貸したくなります。
キャッシュフローの現実

家賃収入5,000万円でも、手残りは1,000万円程度（キャッシュフロー率2%前後）になるのが一般的です。月100万円の手残りを目指すなら、まずは家賃収入5,000万円クラスを目指すのが一つの目安です。`},
  {no:4,tags:["物件選び", "リスク管理", "初心者向け"],title:`高利回り物件が危険な理由｜初心者が見落とす5つの落とし穴`,url:"https://www.youtube.com/watch?v=WsHLjw964To",summary:`不動産投資のスタートとして「戸建て」は少額から始められる魅力的な選択肢ですが、初心者が見落としがちな深刻なリスクが詳しく解説されています。
1. 戸建て投資の「落とし穴」と対策
修繕費の予測不能

300万円で買っても、リフォームで見積もりの倍以上（例：400万円）かかるケースがあります。

特に、長年放置された物件の**配管トラブル（赤サビ、詰まり）**や、家の傾きなどは外見から判断しにくいため注意が必要です。

初心者のうちは「水回り」に手を加える必要がない（壁や床などの表層リフォームで済む）物件を選ぶのが無難です（目安はリフォーム費150万円以下）。
高利回りの裏にある需要リスク

利回りが高い（例：20%以上）ということは、それだけリスクがあるということです。

大学の移転や工場の撤退などで賃貸需要が消滅するエリア（大学依存、工場依存）は非常に危険です。
「違法物件・再建築不可」の融資リスク

建築基準法に違反している（増築未登記など）物件にノンバンク等で無理やり融資を引くと、その後の銀行評価が「債務超過」とみなされ、追加の融資が止まる原因になります。

再建築不可の物件は現金購入なら可能ですが、出口（売却）の際にも融資がつきにくく、苦労します。
2. 狙い目の物件とエリア
「歪み」のあるエリアを狙う

土地が安く手に入るのに、家賃は高く取れるエリア。関東では横須賀が具体例として挙げられています。

横須賀は人口減少が進んでいるものの、商圏として確立されており、相続税路線価が高く出る（銀行評価が出やすい）という特性があります。
自宅から近いエリア

何かあった際にすぐ駆けつけられるだけでなく、地元の信用金庫などの融資（次の一手）を受けやすくなるというメリットがあります。
3. 実体験に基づく教訓（現金の落とし穴）
専門家でも見落とすような「構図（公図）の混乱」により、実は再建築不可だったというトラブルが発生することがあります。
現金購入だと金融機関の審査が入らないため、こうした法的瑕疵を見逃しやすいというリスクがあります。
これから戸建て投資を始める際は、利回りだけにとらわれず、**「適正なリフォーム費」「賃貸需要の継続性」「法的な健全性」**をしっかりと確認することが重要です。`},
  {no:5,tags:["融資・銀行", "規模拡大", "法人化"],title:`なぜ3軒目で融資が止まるのか？1億借りる人が先にやっている2つのこと`,url:"https://www.youtube.com/watch?v=T_xlz-8pqA4",summary:`多くのサラリーマン大家が3棟前後で融資が止まってしまう「3棟目の壁」の正体と、それを突破して規模を拡大するための戦略が解説されています。
1. なぜ3軒目で融資が止まるのか？
サラリーマン「余信（よしん）」の限界

銀行は個人の年収（例：1,000万円）を返済原資とみなしますが、その融資枠（アパートローンの枠）には上限があります。

例えばオリックス銀行などは年収の10倍（1億円）が目安であり、物件を2〜3棟買うとその枠を使い切ってしまうため、次の融資が通らなくなります。
自己資金の枯渇

フルローンであっても諸経費（物件価格の約7%）は現金で払う必要があり、3棟ほど買うと手持ちの現金（1,000万〜1,500万円程度）が底をついてしまいます。
2. 「3棟目の壁」を突破する2つの戦略
法人化と信用金庫の開拓

個人（サラリーマン属性）の枠を使い切る前に、資産管理法人を設立し、地元の信用金庫との取引を開始することが重要です。

信用金庫は地域貢献を重視するため、少額の「運転資金」や「リフォーム資金」の融資から実績（返済実績）を積み上げることで、法人としての信用を築き、より大きな融資（1億円クラスなど）へ繋げられます。
オーバーローンの活用

自己資金を温存するために、物件価格以上の融資（オーバーローン）を引ける金融機関を活用します。

具体的には、日本政策金融公庫や、評価額が高ければ物件価格以上に貸し出してくれるノンバンク（例：AGビジネスサポート）を戦略的に組み込む手法が紹介されています。
3. 銀行と長く付き合うための鉄則
金利交渉をしない

複数の銀行を競わせて金利を下げる交渉は、短期的には有利ですが、長期的な「応援したい顧客」としての信頼を損なう可能性があります。

提示された条件で「歯を食いしばって払う」姿勢が、次の優良物件への融資を引き出す信頼に繋がります。
情報の透明性（不義理をしない）

他行での借り入れを隠して並行審査にかけるなどの「債務隠し」は厳禁です。バレた瞬間に全銀行から融資が止まるリスクがあります。

  {no:8,tags:["物件選び", "初心者向け", "融資・銀行"],title:`初心者が最初の3年で買ってはいけない危険物件5選`,url:"https://www.youtube.com/watch?v=H9NhHjmrJec",summary:`この動画では、不動産投資で規模を拡大していきたい初心者が、最初の3年で避けるべき5つの選択について、投資家の視点から詳しく解説されています。

1. 節税目的のワンルームマンション投資
内容: 「所得税が還付される」「手出し0円」といった謳い文句の投資。

リスク: 節税としては正しくても、銀行からの評価が低く「債務超過（物件価値より借金が多い状態）」と見なされることが多いです。

影響: 次にアパートなどを買おうとした際、銀行から「すでに借金が多すぎる」と判断され、融資が止まってしまう原因になります。

2. 表面利回りだけで判断する
内容: 物件価格に対する家賃収入の割合（表面利回り）だけで「お得」と判断すること。

リスク: 実際には管理費や修繕費がかかる（実質利回り）ほか、入居者が相場より高い家賃を払っている特殊なケース（生活保護やグループホームなど）があります。

注意点: その入居者が退去した後に、相場通りの家賃では利回りが維持できない可能性があるため、周辺相場との乖離を確認する必要があります。

3. 現地調査をしない・自己流で進める
現地調査の重要性: 「駅から徒歩圏内」でも、実際に行ってみると急な階段があったり、周辺が墓地だったりすることがあります。

コミュニティの活用: ネットの情報や営業マンの言葉だけを信じる「自己流」は危険です。大家の会やセミナーに参加し、相談できる仲間や横の繋がりを持つことが成功への近道です。

4. 融資を組む順番を間違える
内容: 銀行によって「年収の何倍まで貸すか」という枠が異なります。

リスク: 例えば、枠が厳しい銀行（オリックス銀行など）から先に借りないと、他の銀行での借り入れが先に枠を埋めてしまい、本来借りられたはずの総額が減ってしまうことがあります。

戦略: 住宅ローンを先に組むと投資用融資が引きにくくなるため、本気で投資をするなら「自宅は最後」がセオリーです。

5. 再建築不可の物件を融資で買う
内容: 接道義務を満たしておらず、今の建物を壊した後に新しい家を建てられない物件。

リスク: 銀行評価が「0円」になることが多く、融資を受けて買うと一気に債務超過に陥ります。

let activeTag = null;
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isYouTube(url) { return url && (url.includes('youtube.com') || url.includes('youtu.be')); }
function renderTagBar() {
  const bar = document.getElementById('tagBar');
  const all = `<button class="tag-btn${activeTag===null?' active':''}" onclick="selectTag(null)">すべて</button>`;
  const tags = ALL_TAGS.map(t => `<button class="tag-btn${activeTag===t?' active':''}" onclick="selectTag('${esc(t)}')">${esc(t)}</button>`).join('');
  bar.innerHTML = all + tags;
}
function selectTag(tag) { activeTag = tag; renderTagBar(); applyFilters(); }
function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = items;
  if (activeTag) list = list.filter(v => v.tags.includes(activeTag));
  if (q) list = list.filter(v => v.title.toLowerCase().includes(q) || v.summary.toLowerCase().includes(q));
  renderCards(list);
}
function renderCards(list) {
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');
  const countEl = document.getElementById('resultCount');
  if (!list.length) { grid.innerHTML=''; noResults.style.display='block'; countEl.textContent='0件'; return; }
  noResults.style.display = 'none';
  countEl.textContent = list.length + '件';
  grid.innerHTML = list.map(v => {
    const THRESHOLD = 120;
    const short = v.summary.slice(0, THRESHOLD);
    const hasMore = v.summary.length > THRESHOLD;
    const tagHtml = v.tags.map(t => `<span class="card-tag">${esc(t)}</span>`).join('');
    const linkHtml = v.url ? `<a href="${esc(v.url)}" target="_blank" rel="noopener" class="btn-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">${isYouTube(v.url)?'<path d="M8 5v14l11-7z"/>':'<path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>'}</svg>
      ${isYouTube(v.url)?'YouTubeで見る':'リンクを開く'}
    </a>` : '';
    return `<div class="card">
      <div class="card-header"><div class="card-num">${esc(v.no)}</div><div class="card-title">${esc(v.title)}</div></div>
      <div class="card-body">
        <div class="card-tags">${tagHtml}</div>
        <div class="card-summary">${esc(short)}${hasMore?'…':''}</div>
        ${hasMore?`<div class="full-text">${esc(v.summary)}</div><button class="expand-btn" onclick="toggleExpand(this)">▼ 続きを読む</button>`:''}
      </div>
      ${linkHtml?`<div class="card-footer">${linkHtml}</div>`:''}
    </div>`;
  }).join('');
}
function toggleExpand(btn) {
  const body = btn.closest('.card-body');
  const full = body.querySelector('.full-text');
  const summary = body.querySelector('.card-summary');
  const open = full.classList.contains('open');
  if (open) { full.classList.remove('open'); summary.classList.remove('hidden'); btn.textContent='▼ 続きを読む'; }
  else { full.classList.add('open'); summary.classList.add('hidden'); btn.textContent='▲ 閉じる'; }
}
let timer;
document.getElementById('searchInput').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(applyFilters, 180); });
renderTagBar(); renderCards(items);
