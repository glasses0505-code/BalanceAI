<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教えてバランス先生シリーズ｜バランス大家ちゃんねる</title>
<style>
  :root {
    --primary: #1a4fa0;
    --primary-dark: #133a7a;
    --accent: #e85d04;
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --text: #1e2333;
    --text-muted: #6b7280;
    --border: #e2e8f0;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-hover: 0 6px 20px rgba(0,0,0,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: #fff;
    padding: 48px 24px 40px;
    text-align: center;
  }

  header .badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 12px;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  header h1 {
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 10px;
  }

  header p {
    font-size: 14px;
    opacity: 0.82;
  }

  header .count {
    display: inline-block;
    background: var(--accent);
    border-radius: 12px;
    padding: 2px 12px;
    font-size: 13px;
    font-weight: 600;
    margin-left: 8px;
  }

  .search-bar {
    max-width: 720px;
    margin: -24px auto 0;
    padding: 0 24px;
    position: relative;
    z-index: 10;
  }

  .search-bar input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    outline: none;
    font-family: inherit;
    color: var(--text);
  }

  .search-bar input:focus {
    box-shadow: 0 4px 24px rgba(26,79,160,0.25);
  }

  .search-icon {
    position: absolute;
    left: 40px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 64px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    margin-top: 8px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
  }

  .card-header {
    padding: 20px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .card-num {
    background: var(--primary);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    min-width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-title {
    font-size: 14.5px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
  }

  .card-body {
    padding: 16px 22px;
    flex: 1;
    overflow: hidden;
  }

  .card-summary {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.75;
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
  }

  .btn-watch {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
    transition: background 0.15s ease, opacity 0.15s ease;
  }

  .btn-watch:hover {
    background: #c44b02;
  }

  .btn-watch svg {
    flex-shrink: 0;
  }

  .expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--primary);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 0;
    margin-top: 4px;
    font-family: inherit;
    display: block;
  }

  .expand-btn:hover { text-decoration: underline; }

  .full-text {
    display: none;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.75;
    margin-top: 6px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .full-text.open { display: block; }
  .card-summary.hidden { display: none; }

  .tag-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .tag-btn {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .tag-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .tag-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }

  .card-tag {
    background: #eef2ff;
    color: var(--primary);
    border-radius: 10px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 600;
  }

  .stats-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .stats-bar span {
    font-size: 13px;
    color: var(--text-muted);
  }

  .no-results {
    text-align: center;
    padding: 64px 24px;
    color: var(--text-muted);
    display: none;
  }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    background: var(--card-bg);
  }

  @media (max-width: 600px) {
    header { padding: 36px 16px 36px; }
    .container { padding: 40px 16px 48px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">バランス大家ちゃんねる</div>
  <h1>教えてバランス先生シリーズ<span class="count">全33本</span></h1>
  <p>不動産投資の基礎から実践まで。厳選された動画コンテンツを一覧で。</p>
</header>

<div class="search-bar">
  <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input type="text" id="searchInput" placeholder="タイトル・内容で検索…" autocomplete="off">
</div>

<div class="container">
  <div class="tag-bar" id="tagBar"></div>
  <div class="stats-bar">
    <span id="resultCount">33本の動画</span>
  </div>

  <div class="grid" id="videoGrid"></div>
  <div class="no-results" id="noResults">検索結果がありません。</div>
</div>

<footer>

<script>
const videos = [
  {no:1, tags:["売却・出口","契約"], title:"売却の流れ教えて！【教えてバランス先生！】",url:"https://www.youtube.com/watch?v=vsyHdQeg_So",summary:`不動産売却の全体的な流れと初心者が特に注意すべきポイントを5つのステップで解説。

1. 売却の準備と仲介会社の選定 — 信頼できる業者選び・査定額の罠・高値売却のコツ。

4. 売買契約と交渉 — 買付・手付金・融資特約・契約不適合責任の扱い方。
5. 決済・引渡し時の注意 — 権利証・実印の準備、境界確認、管理会社の引き継ぎ。`},
  {no:2, tags:["区分マンション","融資・銀行","物件選び"], title:"なんで1ルーム区分買っちゃいけないの？【教えてバランス先生】",url:"https://www.youtube.com/watch?v=esJ94Ue8Pdw",summary:`規模拡大を目指す人にとってワンルーム区分マンション投資が危険な理由を解説。

② 「赤字経営者」とみなされる — 毎月持ち出しがあると銀行の追加融資が止まる。

節税目的なら否定しないが、規模拡大を目指すなら、既に持っている場合も100〜200万の損切り売却を検討すべき。`},
  {no:3, tags:["売却・出口","契約"], title:"媒介契約ってな〜に？【教えてバランス先生】",url:"https://www.youtube.com/watch?v=G2xFP1vqbsg",summary:`不動産売却時に結ぶ媒介契約の3種類を解説。

・一般媒介 — 複数業者に依頼可。市場露出が増え高値売却を狙いやすい。
・専任媒介 — 1社のみ。自己発見取引は可。

  {no:4, tags:["家賃設定・客付け"], title:"教えてバランス先生！賃料はどうやって決めたらいいの？【技術編】",url:"https://www.youtube.com/watch?v=0xroSgGTI6o",summary:`適正な家賃設定と相場の調べ方を実践的に解説。

・大手仲介・地場業者・中堅業者の3社以上にヒアリングするのが鉄則。

  {no:5, tags:["法人・税務"], title:"【教えてバランス先生！！】鳩マークとウサギマークの違いってな〜に？？？",url:"https://www.youtube.com/watch?v=9p1hxv4ElAM",summary:`不動産業界の2大団体「全宅連（ハトマーク）」と「全日（ウサギマーク）」の違いを解説。

  {no:6, tags:["マインドセット"], title:"奥様（ご主人）ブロックの外し方！【教えてバランス先生】",url:"https://www.youtube.com/watch?v=DUYrjA9YEjM",summary:`不動産投資でパートナーから反対される「奥様ブロック」の原因と解消法。

  {no:7, tags:["戸建投資","規模拡大戦略"], title:"やってはいけない？戸建利回20％の作り方！資産が増えない方法",url:"https://www.youtube.com/watch?v=_30hPGELjZ8",summary:`ボロ戸建て投資で高利回りを出す手法のBSの観点での限界を解説。

100万円で物件を買っても純資産は変わらず、現金が固定資産に置き換わるだけ。銀行融資がつきにくいためレバレッジも使えない。

・向いている人：まず手元CFを増やしたい初心者。
・向いていない人：急速に資産規模を拡大したい人。`},
  {no:8, tags:["融資・銀行","物件選び"], title:"教えてバランスさん！融資がつかない物件に融資を付けると融資が止まるって本当？",url:"https://www.youtube.com/watch?v=JY9eLFtVW7w",summary:`違法物件・再建築不可など遵法性のない物件に無理に融資を受けると、その後の銀行融資が止まる理由を解説。

銀行は違法物件の担保価値を「0円」とみなすため「1,000万円の債務超過」と判断される。耐用年数超えやエレベーターなし5階などでも同様のリスクあり。

十分な余信（資産背景）がある状態でないと購入は慎重に。`},
  {no:9, tags:["マインドセット"], title:"TTP（徹底的にパクる）で売上を上げるコツ【技術編】",url:"https://www.youtube.com/watch?v=xo5RbF4cuDo",summary:`成功者のマインドを徹底的にコピーする「TTP」の真髄と失敗パターンを解説。

実践例：師匠の「売却が最高収益」という教えを即TTPし、手取収益を1億→1.8億に加速。`},
  {no:10, tags:["家賃設定・客付け"], title:"教えてバランスさん！高い家賃で貸すにはどうすればいいの？？",url:"https://www.youtube.com/watch?v=BLbKqtxfPFQ",summary:`利回り20%戸建てを実現するための「高く貸す」テクニックを解説。

・値下げは最後の手段。まずはフリーレント・家具家電付きを試す。
・業者が渋る場合はジモティーへ自分で掲載。`},
  {no:11, tags:["戸建投資","家賃設定・客付け"], title:"50平米以下の戸建家賃設定【技術編】",url:"https://www.youtube.com/watch?v=-f_Y2xL7vMk",summary:`相場が分かりにくい小規模戸建ての家賃設定テクニックを解説。

・現地に行き近隣の同規模アパートの募集家賃を調べる。

・戸建てはペット可にして差別化し、相場より強気な価格設定が有効。
・実例：相場9.5万→12.5万円で入居者が決まったケースも。`},
  {no:12, tags:["規模拡大戦略","法人・税務","融資・銀行"], title:"年収３００万の規模拡大戦略【技術編】【毎朝投稿】",url:"https://www.youtube.com/watch?v=c2Cn3kyJ9hs",summary:`年収300万円・属性低め・自己資金少なめから規模を拡大する具体的ロードマップ。

① 今すぐ法人を設立（実家登記OK）。
② 20〜30万円のボロ戸建てをDIYリフォームして家賃収入を作り、決算書を育てる。
③ 3〜5年で4〜5件の実績を作り公庫・信金への交渉材料に。
④ 5〜6年目でボロ戸建てを売却して500万円のキャッシュを作り、3,000万円前後のアパートへ移行。`},
  {no:13, tags:["法人・税務","融資・銀行"], title:"教えてバランスさん！多法人スキームって何？【技術編】",url:"https://www.youtube.com/watch?v=IzlPI8RoVoU",summary:`不動産投資における「多法人スキーム」の仕組み・目的・リスクを解説。

銀行ごとに別法人を設立して融資を受け、短期間で規模拡大を図る手法。現在は銀行チェックが厳しく「封じられた」との声も多い。

合理的な多法人利用として：法人税の800万超え対策・法人ごとのM&A（売却）による出口戦略も。

※虚偽申告に近いリスクがあるため要注意。`},
  {no:14, tags:["融資・銀行"], title:"保証協会融資とプロパー融資何が違うの？",url:"https://www.youtube.com/watch?v=kLlifdgcDX8",summary:`不動産投資・中小企業経営で重要な2つの融資形態の違いを解説。

・プロパー融資：銀行独自判断。審査が厳しいが柔軟な条件で大きな融資を引ける。

戦略：まず保証協会付きで実績を積み、債務者区分を上げてプロパー融資を目指すのが理想。`},
  {no:15, tags:["融資・銀行"], title:"銀行アポどりのコツ○○曜日をねらえ！",url:"https://www.youtube.com/watch?v=5mIxgvkQ9vE",summary:`銀行担当者とスムーズにアポを取るための具体的コツを解説。

・水曜日を狙う：不動産会社の定休日が多く、銀行担当者に時間的余裕が生まれやすい。

  {no:16, tags:["法人・税務","融資・銀行"], title:"教えてバランスさん！法人所在地はどこが良いの？",url:"https://www.youtube.com/watch?v=lU-L9dBDCVU",summary:`不動産投資向け法人を設立・移転する際の所在地選定の判断基準を解説。

最大の基準は「融資を受けたい金融機関の営業エリア」。信金は原則その地域の法人にしか融資しない。

・NGな形態：レンタル・バーチャル・シェアオフィス（多くの信金がNG）。
・支店登記の活用で本店を移さずに対応できる場合も（湘南信金・神奈川信金など）。`},
  {no:17, tags:["戸建投資","融資・銀行","規模拡大戦略"], title:"戸建投資で規模拡大する為に必要なたった一つのコト【技術編】前編",url:"https://www.youtube.com/watch?v=26OtRR4bzcM",summary:`戸建投資で規模をスピーディーに拡大するための核心戦略。

「市場価格より銀行の担保評価が高い物件をフルローンで購入する」こと。

例：市場500万円の物件に1,000万円の担保評価が出れば、銀行目線では資産超過になる。フルローンで現金を温存し、次の投資資金に回せる。こうした物件を1年で22個購入し2億円の資産を構築した実例を紹介。`},
  {no:18, tags:["融資・銀行","契約"], title:"抵当権と根抵当権の違い教えて！【教えてバランス先生！】",url:"https://www.youtube.com/watch?v=zrvmGdFRCtE",summary:`銀行が根抵当権を勧める実務的な理由と注意点を解説。

const ALL_TAGS = ["融資・銀行","物件選び","戸建投資","区分マンション","家賃設定・客付け","売却・出口","法人・税務","賃貸管理","契約","規模拡大戦略","マインドセット"];

let activeTag = null;

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTagBar() {
  const bar = document.getElementById('tagBar');
  const allBtn = `<button class="tag-btn${activeTag === null ? ' active' : ''}" onclick="selectTag(null)">すべて</button>`;
  const tagBtns = ALL_TAGS.map(t =>
    `<button class="tag-btn${activeTag === t ? ' active' : ''}" onclick="selectTag('${t}')">${t}</button>`
  ).join('');
  bar.innerHTML = allBtn + tagBtns;
}

function selectTag(tag) {
  activeTag = tag;
  renderTagBar();
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let result = videos;
  if (activeTag) {
    result = result.filter(v => v.tags.includes(activeTag));
  }
  if (q) {
    result = result.filter(v =>
      v.title.toLowerCase().includes(q) || v.summary.toLowerCase().includes(q)
    );
  }
  renderCards(result);
}

function renderCards(list) {
  const grid = document.getElementById('videoGrid');
  const noResults = document.getElementById('noResults');
  const countEl = document.getElementById('resultCount');

  if (list.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    countEl.textContent = '0本の動画';
    return;
  }

  noResults.style.display = 'none';
  countEl.textContent = list.length + '本の動画';

  grid.innerHTML = list.map(v => {
    const THRESHOLD = 120;
    const short = v.summary.slice(0, THRESHOLD);
    const hasMore = v.summary.length > THRESHOLD;
    const tagHtml = v.tags.map(t => `<span class="card-tag">${escapeHtml(t)}</span>`).join('');
    return `
    <div class="card" data-no="${v.no}">
      <div class="card-header">
        <div class="card-num">${v.no}</div>
        <div class="card-title">${escapeHtml(v.title)}</div>
      </div>
      <div class="card-body">
        <div class="card-tags">${tagHtml}</div>
        <div class="card-summary">${escapeHtml(short)}${hasMore ? '…' : ''}</div>
        ${hasMore ? `<div class="full-text">${escapeHtml(v.summary)}</div>
        <button class="expand-btn" onclick="toggleExpand(this)">▼ 続きを読む</button>` : ''}
      </div>
      <div class="card-footer">
        <a href="${v.url}" target="_blank" rel="noopener" class="btn-watch">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          YouTubeで見る
        </a>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(btn) {
  const body = btn.closest('.card-body');
  const full = body.querySelector('.full-text');
  const summary = body.querySelector('.card-summary');
  const isOpen = full.classList.contains('open');
  if (isOpen) {
    full.classList.remove('open');
    summary.classList.remove('hidden');
    btn.textContent = '▼ 続きを読む';
  } else {
    full.classList.add('open');
    summary.classList.add('hidden');
    btn.textContent = '▲ 閉じる';
  }
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => applyFilters(), 180);
});

renderTagBar();
renderCards(videos);
</script>
